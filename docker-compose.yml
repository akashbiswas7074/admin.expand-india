version: '3.8'

services:
  expand-india-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    container_name: expand-india-app
    networks:
      - expand-india-network

  # Optional: Add Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - expand-india-app
    restart: unless-stopped
    container_name: expand-india-nginx
    networks:
      - expand-india-network

networks:
  expand-india-network:
    driver: bridge 